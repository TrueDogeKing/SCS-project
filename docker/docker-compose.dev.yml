services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      - NODE_ENV=development
      - TTP_URL=http://ttp:3002
    ports:
      - "3001:3001"
    volumes:
      - ../server/src:/app/server/src
    command: [ "bun", "run", "--cwd", "./server", "src/api.ts" ]

  ttp:
    build:
      context: ..
      dockerfile: ttp/Dockerfile
    environment:
      - NODE_ENV=development
    ports:
      - "3002:3002"
    volumes:
      - ../ttp/src:/app/ttp/src
    command: [ "bun", "run", "--cwd", "./ttp", "src/api.ts" ]

  client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    environment:
      - NODE_ENV=development
      - VITE_SERVER_URL=http://localhost:3001
      - VITE_TTP_URL=http://localhost:3002
    ports:
      - "5173:5173"
    volumes:
      - ../client/src:/app/client/src
      - ../client/public:/app/client/public
      - ../client/package.json:/app/client/package.json
      - ../client/bun.lock:/app/client/bun.lock
    command: [ "sh", "-lc", "cd /app/client && bun install && bun dev --host" ]
