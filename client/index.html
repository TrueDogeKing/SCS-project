<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCS Project - Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .status {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #efefef;
            border-color: #bbb;
        }

        #output {
            margin-top: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        #output.show {
            display: block;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .timestamp {
            color: #999;
            font-size: 11px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SCS Client</h1>

        <div class="status">
            <strong>Status:</strong> Not connected<br>
            <strong>Server:</strong> Not configured
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="initializeClient()">Initialize Client</button>
            <button class="btn-secondary" onclick="clearOutput()">Clear Output</button>
        </div>

        <div id="output">
            <div class="log-entry">
                <span class="timestamp">[Ready]</span> Client interface loaded
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
